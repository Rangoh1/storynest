<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password - StoryNest</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

 <header class="navbar">

        <div class="logo">
            📖 StoryNest
        </div>

        <nav>

            <a href="#">Home</a>

            <a href="#">Stories</a>

            <a href="#">Categories</a>

            <a href="#">About</a>

            <a href="#">Contact</a>

        </nav>

        <button class="share-btn">
            Share Story
        </button>

    </header>

    <main class="auth-page">

    <div class="auth-card">

    <h1>Forgot Password?</h1>

<p>
Enter the email address or phone number associated with your account.
We'll send you a verification code.
</p>

<form action="verify.html">

    <input
        type="text"
        placeholder="Email or Phone Number"
        required
    >

    <button type="submit">
        Send Code
    </button>

</form>

<div class="auth-footer">

    <p>
        Remember your password?

        <a href="login.html">
            Login
        </a>
    </p>

</div>

    </div>

</main>

<script src="../js/auth.js"></script>

</body>
</html>
