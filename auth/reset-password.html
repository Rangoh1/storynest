<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Reset Password - StoryNest</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

 <header class="navbar">

        <div class="logo">
            📖 StoryNest
        </div>

        <nav>

            <a href="#">Home</a>

            <a href="#">Stories</a>

            <a href="#">Categories</a>

            <a href="#">About</a>

            <a href="#">Contact</a>

        </nav>

        <button class="share-btn">
            Share Story
        </button>

    </header>

    <main class="auth-page">

    <div class="auth-card">

<h1>Create New Password</h1>

<p>
Choose a new password for your StoryNest account.
</p>

<form action="login.html">

    <input
        type="password"
        placeholder="New Password"
        required
    >

    <input
        type="password"
        placeholder="Confirm New Password"
        required
    >

    <button type="submit">
        Update Password
    </button>

</form>

<div class="auth-footer">

    <p>
        Password updated successfully? <a href="login.html">Login</a>
    </p>

</div>

    </div>

</main>

<script src="../js/auth.js"></script>

</body>
</html>
