<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sign Up - StoryNest</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

 <header class="navbar">

        <div class="logo">
            📖 StoryNest
        </div>

        <nav>

            <a href="#">Home</a>

            <a href="#">Stories</a>

            <a href="#">Categories</a>

            <a href="#">About</a>

            <a href="#">Contact</a>

        </nav>

        <button class="share-btn">
            Share Story
        </button>

    </header>

    <main class="auth-page">

    <div class="auth-card">

    <h1>Create Account</h1>

    <p>Join StoryNest and start sharing your experiences anonymously.</p>

<form id="signupForm">
    
<input
    id="alias"
    type="text"
    placeholder="Alias (Username)"
    required

>

    <input
        id="contact"
        type="text"
        placeholder="Email or Phone Number"
        required
    >

    <input
        id="password"
        type="password"
        placeholder="Password"
        required
    >

    <input
    id="confirmPassword"
    type="password"
    placeholder="Confirm Password"
    required
>



    <label class="terms-check">

    <input 
    id="terms"
    type="checkbox"
     required
     >

    I agree to the Community Guidelines and Privacy Policy.

</label>


    <button type="submit">

    Create Account

    </button>

</form>

<div class="auth-footer">

    <p>

        Already have an account?

        <a href="login.html">

            Login

        </a>

    </p>

</div>

    </div>

</main>

<script src="../js/auth.js"></script>

</body>
</html>
