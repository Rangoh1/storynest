<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Verify Account - StoryNest</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

 <header class="navbar">

        <div class="logo">
            📖 StoryNest
        </div>

        <nav>

            <a href="#">Home</a>

            <a href="#">Stories</a>

            <a href="#">Categories</a>

            <a href="#">About</a>

            <a href="#">Contact</a>

        </nav>

        <button class="share-btn">
            Share Story
        </button>

    </header>

    <main class="auth-page">

        <div class="auth-card">
        
<h1>Verify Your Account</h1>

 <p id="verificationMessage">
    We've sent a 6-digit verification code...
</p>

<div class="developer-box">

    <h3>Developer Mode</h3>

    <p>Verification Code:</p>

    <h2 id="developerCode">
        ------
    </h2>

    <small>This panel is only visible during development.</small>

</div>

<form id="verifyForm">

    <input
        id="verificationInput"
        type="text"
        maxlength="6"
        placeholder="Enter 6-digit code"
        required
    >

    <button type="submit">
        Verify
    </button>

</form>

<div class="auth-footer">

    <p>
        Didn't receive the code?
        <a href="#">Resend Code</a>
    </p>

</div>

</div>

</main>

<script src="../js/auth.js"></script>

</body>
</html>
