<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - StoryNest</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

 <header class="navbar">

        <div class="logo">
            📖 StoryNest
        </div>

        <nav>

            <a href="#">Home</a>

            <a href="#">Stories</a>

            <a href="#">Categories</a>

            <a href="#">About</a>

            <a href="#">Contact</a>

        </nav>

        <button class="share-btn">
            Share Story
        </button>

    </header>

    <main class="auth-page">

    <div class="auth-card">

        <h1>Welcome Back</h1>

<p>Login to continue sharing your story.</p>

<form id="loginForm" action="../index.html">

    <input
        type="text"
        placeholder="Email or Phone Number"
    >

    <input
        type="password"
        placeholder="Password"
    >

    <div class="auth-options">

        <label>

            <input type="checkbox">

            Remember Me

        </label>

     <a href="forgot-password.html">
       Forgot Password?
      </a>

    </div>

    <button type="submit">

        Login

    </button>

</form>

<div class="auth-footer">

    <p>

        Don't have an account?

        <a href="signup.html">

            Create Account

        </a>

    </p>

</div>

    </div>

</main>

<script src="../js/auth.js"></script>

</body>
</html>
