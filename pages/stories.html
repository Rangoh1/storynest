<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Stories - StoryNest</title>

    <link rel="stylesheet"
          href="../css/style.css">

</head>

<body>

    <header class="navbar">

        <div class="logo">
            📖 StoryNest
        </div>

        <nav>

            <a href="../index.html">Home</a>

            <a href="stories.html">Stories</a>

            <a href="#">Categories</a>

            <a href="#">About</a>

            <a href="#">Contact</a>

        </nav>

        <button class="share-btn">
            Share Story
        </button>

    </header>

    <main>

        <section class="stories-hero">

            <h1>Stories</h1>

            <p>
                Discover real experiences shared by people from around the world.
            </p>

<div class="filters-card">

    <div class="search-container">

        <input
            type="text"
            id="searchBox"
            placeholder="🔍 Search stories...">

    </div>

    <div class="story-filters">

        <div class="filter-group">

            <label for="categoryFilter">

                Category

            </label>

            <select id="categoryFilter">

                <option value="All">

                    All

                </option>

            </select>

        </div>

        <div class="filter-group">

            <label for="sortFilter">

                Sort By

            </label>

            <select id="sortFilter">

                <option value="newest">

                    Newest

                </option>

                <option value="oldest">

                    Oldest

                </option>

                <option value="likes">

                    Most Liked

                </option>

                <option value="views">

                    Most Viewed

                </option>

            </select>

        </div>

    </div>

</div>

        </section>

        <section class="stories-list">

            <div
                class="stories-grid"
                id="storiesGrid">

            </div>

        </section>

    </main>

<script src="../js/storage.js"></script>
<script src="../js/categories.js"></script>
<script src="../js/navigation.js"></script>
<script src="../js/stories.js"></script>

</body>

</html>
