<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Stories - StoryNest</title>

    <link rel="stylesheet"
          href="../css/style.css">

</head>

<body>

    <header class="navbar">

        <div class="logo">
            📖 StoryNest
        </div>

        <nav>

            <a href="../index.html">Home</a>

            <a href="stories.html">Stories</a>

            <a href="#">Categories</a>

            <a href="#">About</a>

            <a href="#">Contact</a>

        </nav>

        <button class="share-btn">
            Share Story
        </button>

    </header>

    <main>

        <section class="stories-hero">

            <h1>Stories</h1>

            <p>
                Discover real experiences shared by people from around the world.
            </p>

            <input
                type="text"
                id="searchBox"
                class="search-box"
                placeholder="Search stories...">

            <div class="category-buttons">

                <button class="category active">
                    All
                </button>

                <button class="category">
                    Relationships
                </button>

                <button class="category">
                    Family
                </button>

                <button class="category">
                    Career
                </button>

                <button class="category">
                    Money
                </button>

                <button class="category">
                    Personal Growth
                </button>

            </div>

        </section>

        <section class="stories-list">

            <div
                class="stories-grid"
                id="storiesGrid">

            </div>

        </section>

    </main>

    <script src="../js/stories.js"></script>

</body>

</html>
