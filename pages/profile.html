<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Profile | StoryNest</title>

    <link rel="stylesheet"
          href="../css/style.css">

</head>

<body>

<header class="navbar">

    <a href="home.html" class="logo">

        📖 StoryNest

    </a>

    <nav class="nav-links">

        <a href="home.html">Home</a>

        <a href="stories.html">Stories</a>

        <a href="categories.html">Categories</a>

        <a href="#">Trending</a>

    </nav>

    <div id="navActions" class="nav-actions"></div>

</header>

<main>

    <div class="profile-container">

        <div class="profile-header">

            <div class="profile-avatar">

                👤

            </div>

            <h1 id="profileAlias">

                Loading...

            </h1>

            <p id="profileJoined">

                Joined: ...

            </p>

        </div>

        <div class="profile-stats">

            <div class="stat-card">

                <h2 id="storyCount">0</h2>

                <p>Stories</p>

            </div>

            <div class="stat-card">

                <h2 id="likesCount">0</h2>

                <p>Likes</p>

            </div>

            <div class="stat-card">

                <h2 id="commentsCount">0</h2>

                <p>Comments</p>

            </div>

        </div>

        <section class="profile-stories">

            <h2>My Stories</h2>

            <div id="userStories">

            </div>

        </section>

    </div>

</main>

<script src="../js/profile.js"></script>
<script src="../js/navigation.js"></script>

</body>

</html>
