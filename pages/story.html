<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>StoryNest</title>

    <link rel="stylesheet" href="../css/style.css">

</head>

<body>

<header class="navbar">

    <div class="logo">
        📖 StoryNest
    </div>

    <nav>

        <a href="home.html">Home</a>

        <a href="stories.html">Stories</a>

        <a href="#">Categories</a>

        <a href="#">Trending</a>

    </nav>

</header>

<main class="story-page">

<div class="story-container">

<div class="story-category"
     id="storyCategory">

Category

</div>

<h1 id="storyTitle">

Story Title

</h1>

<p class="story-author">

<strong id="storyAuthor">

@Author

</strong>

•

<span id="storyTime">

Just now

</span>

</p>

<div class="story-meta">

<span id="storyViews">

👁️ 0

</span>

<span id="storyLikes" class="story-action">

❤️ 0

</span>

<span id="storyComments">

💬 0

</span>

</div>

<div class="story-content"
     id="storyContent">

Story content...

</div>

<div class="story-footer">

    <div class="story-stats">

        <span id="storyLikes" class="story-action">🤍 0</span>

        <span>💬 0</span>

        <span>👁️ 0</span>

    </div>

    <div class="story-actions">

        <span id="saveStory" class="story-action">
            🔖 Save
        </span>

    </div>

    <a href="home.html" class="read-link">

        ← Back to Stories

    </a>

    </div>

<section class="comments-section">

    <h2>💬 Comments</h2>

    <textarea
        id="commentInput"
        placeholder="Write your comment...">
    </textarea>

    <button id="postCommentBtn">

        Post Comment

    </button>

    <div id="commentsContainer">

    </div>

</section>

</div>

</main>

<script src="../js/auth.js"></script>
<script src="../js/comments.js"></script>  

</body>

</html>
